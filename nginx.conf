server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Try to find the file; if it's missing, go to index.html (for SPA routing)
        try_files $uri $uri/ /index.html;

        # CRITICAL: These headers allow Replicad's WASM to use SharedArrayBuffer
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # Help Nginx identify specific file types correctly
    types {
        application/wasm wasm;
        application/javascript js;
        text/css css;
        text/html html;
    }
}